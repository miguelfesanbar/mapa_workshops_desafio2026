<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa de Workshops de Ideação - Desafio Agrostartup</title>

  <!-- CSS do Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>
  <div class="app">
    <div class="map-area">
      <div class="topbar">
  <div class="topbar-content">
    
    <img src="https://sistemafaeg.com.br/dist/img/logos/logo-desafio-agrostartup-10-anos.webp" alt="Logo" class="topbar-logo">
    
    <div class="topbar-text">
      <h1>Mapa de Workshops de Ideação</h1>
      <p>Pesquise por cidade ou universidade e clique no mapa para ver os workshops</p>
    </div>

  </div>
</div>
    
      <div class="map-search-bar">
        <div class="search-container">
          <input type="text" id="searchInput" placeholder="Buscar cidade ou instituição de ensino...">
          <button id="clearSearchBtn" type="button">✕</button>
        </div>
      </div>
    
      <div class="map-wrapper">
        <div id="map"></div>
    
        <!-- <div class="legend-box">
          <strong>Legenda</strong>
          Áreas destacadas representam cidades com workshops cadastrados.
        </div> -->
      </div>
    </div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-drag-area" id="sidebarDragArea">
        <div class="sidebar-handle" id="sidebarHandle"></div>
    
        <div class="sidebar-header">
          <h2>Workshops de Ideação</h2>
          <p>Lista de workshops disponíveis</p>
        </div>
      </div>
    
      <div id="sidebar-content" class="sidebar-content"></div>
    </aside>
  </div>

  <!-- JS do Leaflet -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script src="script.js?v=3"></script>
</body>

</html>
